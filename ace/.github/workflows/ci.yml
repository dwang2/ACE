name: CI

# Reference CI workflow installed by the ACE (Agentic Collaborative Engineering) package.
# This is a starting point — customize for your stack. See
# .claude/skills/ci-pipeline/SKILL.md for the design rationale.

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege default. Each job grants what it needs.
permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Python jobs (remove if your repo is not Python)
  # ---------------------------------------------------------------------------
  python-lint:
    if: hashFiles('pyproject.toml', 'requirements*.txt', '**/*.py') != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e '.[dev]' || pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .

  python-typecheck:
    if: hashFiles('pyproject.toml', '**/*.py') != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e '.[dev]' || pip install -r requirements-dev.txt
      - run: mypy --strict src

  python-test:
    if: hashFiles('pyproject.toml', '**/*.py') != ''
    runs-on: ubuntu-latest
    needs: [python-lint, python-typecheck]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -e '.[dev]' || pip install -r requirements-dev.txt
      - run: pytest --cov=src --cov-report=xml --cov-report=term
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: python-coverage
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # Go jobs (remove if your repo is not Go)
  # ---------------------------------------------------------------------------
  go-lint:
    if: hashFiles('go.mod') != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9  # v8.0.0
        with:
          version: latest

  go-test:
    if: hashFiles('go.mod') != ''
    runs-on: ubuntu-latest
    needs: [go-lint]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: go test -race -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: go-coverage
          path: coverage.out

  # ---------------------------------------------------------------------------
  # TypeScript / Node jobs (remove if your repo is not TS/JS)
  # ---------------------------------------------------------------------------
  ts-lint-typecheck-test:
    if: hashFiles('package.json') != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda  # v4.1.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test --coverage

  # ---------------------------------------------------------------------------
  # Security scans (applies to all repos)
  # ---------------------------------------------------------------------------
  sast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: github/codeql-action/init@4e828ff8d448a8a6e532957b1811f387a63867e8  # v3.29.4
        with:
          languages: ${{ vars.CODEQL_LANGUAGES || 'python,go,javascript-typescript' }}
      - uses: github/codeql-action/analyze@4e828ff8d448a8a6e532957b1811f387a63867e8  # v3.29.4

  sca:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/dependency-review-action@bc41886e18ea39df68b1b1245f4184881938e050  # v4.7.3
        with:
          fail-on-severity: high

  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
