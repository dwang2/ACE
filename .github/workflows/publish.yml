name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push version bump commit + tag
      id-token: write   # npm provenance attestation
    steps:
      # 1. Updated from @v4 to @v6 to support the Node 24 runner
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 2. Updated from @v4 to @v6 to support the Node 24 runner
      # Note: 'node-version' controls the Node version used to run YOUR app/tests,
      # which is perfectly fine to leave as '20' if that's your project's target.
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Run tests
        run: node --test tests/installer.test.js

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          - name: Commit and tag
          env:
            # This securely passes the automatically generated GitHub token to your git command
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
            git add package.json
            git commit -m "chore: release v${{ steps.bump.outputs.version }}"
            git tag "v${{ steps.bump.outputs.version }}"
            
            # Explicitly point to the repository URL using the token for authentication
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:main --tags

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes